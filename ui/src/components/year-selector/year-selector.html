<button matIconButton (click)="searchService.changeYear('prev')">
  <mat-icon>arrow_backward</mat-icon>
</button>
<button matButton (click)="searchService.setYearToMin()">{{ searchService.minYear() }}</button>
<span>|</span>
<button matButton>{{ searchService.selectedYear() }}</button>
<span>|</span>
<button matButton (click)="searchService.setYearToMax()">{{ searchService.maxYear() }}</button>
<button matIconButton (click)="searchService.changeYear('next')">
  <mat-icon>arrow_forward</mat-icon>
</button>
