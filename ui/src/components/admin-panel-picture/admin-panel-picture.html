<form [formGroup]="details">
  <mat-form-field appearance="outline">
    <mat-label>Tytuł</mat-label>
    <input formControlName="title" [readonly]="true" matInput>
  </mat-form-field>
  <mat-form-field appearance="outline">
    <mat-label>Rok</mat-label>
    <input formControlName="year" [readonly]="true" matInput>
  </mat-form-field>
  <mat-form-field appearance="outline">
    <mat-label>Obszar</mat-label>
    <input formControlName="parentArea" [readonly]="true" matInput>
  </mat-form-field>
  <mat-form-field appearance="outline">
    <mat-label>Miejsce</mat-label>
    <input formControlName="area" [readonly]="true" matInput>
  </mat-form-field>
  <mat-form-field appearance="outline">
    <mat-label>Dodał</mat-label>
    <input formControlName="updatedBy" [readonly]="true" matInput>
  </mat-form-field>
  <mat-form-field appearance="outline">
    <mat-label>Dnia</mat-label>
    <input formControlName="updatedOn" [readonly]="true" matInput>
  </mat-form-field>
  <mat-form-field style="grid-column: 1 / span 2" appearance="outline">
    <mat-label>Opis</mat-label>
    <input formControlName="description" [readonly]="true" matInput>
  </mat-form-field>
</form>
