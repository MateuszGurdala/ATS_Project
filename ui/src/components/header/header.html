<div>
  <a href="/main" class="main-text">
    <h1>Nasz Ursynów</h1>
  </a>

  @if (showLoginButton()) {
    <a href="/login" class="login-btn">
      <button matButton
              aria-label="Example icon button with a vertical three dot icon">
        Twoje Konto
      </button>
    </a>
  } @else if (userAccountService.isAuthenticated.value) {
    <button matButton class="add-pct-btn"
            aria-label="Example icon button with a vertical three dot icon">
      Dodaj zdjęcia
    </button>
    <button matButton
            (click)="onLogOut()"
            aria-label="Example icon button with a vertical three dot icon">
      Wyloguj Się
    </button>
  }
</div>
